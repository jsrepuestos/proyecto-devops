<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Proyecto DevOps</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0b1220;
            color: #ce2e2e;
        }

        header {
            background: #111a2e;
            padding: 20px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            color: #ff4db5;
        }

        .container {
            padding: 40px;
            text-align: center;
        }

        .box {
            background: #16213a;
            padding: 20px;
            margin: 20px auto;
            width: 80%;
            border-radius: 10px;
        }

        h1, h2 {
            color: #4da3ff;
        }

        p {
            color: #cbd5e1;
        }
    </style>
</head>

<body>

<header>
    Proyecto DevOps
</header>

<div class="container">

    <div class="box">
        <h1>Proyecto DevOps funcionando</h1>
        <p>Servidor en Google Cloud con Docker</p>
    </div>

    <div class="box">
        <h2>CI/CD Pipeline</h2>
        <p>Deploy automático desde GitHub Actions</p>
    </div>

    <div class="box">
        <h2>Estado</h2>
        <p>Deploy final exitoso</p>
    </div>

</div>

</body>
</html>
