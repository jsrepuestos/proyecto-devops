<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CloudNova DevOps Platform</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0b1220;
            color: white;
        }

        header {
            background: #111a2e;
            padding: 20px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            color: #4da3ff;
        }

        .container {
            padding: 40px;
            text-align: center;
        }

        .card {
            background: #16213a;
            padding: 20px;
            margin: 20px auto;
            width: 80%;
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(0,0,0,0.4);
        }

        .status {
            color: #22c55e;
            font-weight: bold;
        }

        footer {
            text-align: center;
            padding: 20px;
            margin-top: 40px;
            color: #888;
        }
    </style>
</head>

<body>

<header>
    🚀 CloudNova DevOps Dashboard
</header>

<div class="container">

    <div class="card">
        <h2>Proyecto DevOps funcionando</h2>
        <p>Servidor en Google Cloud con Docker</p>
        <p class="status">STATUS: ONLINE 🟢</p>
    </div>

    <div class="card">
        <h3>CI/CD Pipeline</h3>
        <p>GitHub Actions / Deploy Automático</p>
        <p class="status">ACTIVE 🟢</p>
    </div>

    <div class="card">
        <h3>Deploy Status</h3>
        <p>Última versión desplegada correctamente</p>
        <p class="status">SUCCESS 🟢</p>
    </div>

</div>

<footer>
    © 2026 CloudNova Solutions - DevOps & Cloud Engineering
</footer>

</body>
</html>
