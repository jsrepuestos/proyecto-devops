name: Deploy to GCP VM

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 34.70.144.55 >> ~/.ssh/known_hosts

      - name: Test SSH Connection
        run: |
          ssh -i ~/.ssh/id_ed25519 jsrepuestosservicios@34.70.144.55 "echo '✅ SSH OK'"

      - name: Deploy
        run: |
          ssh -i ~/.ssh/id_ed25519 jsrepuestosservicios@34.70.144.55 << 'EOF'
            cd ~/proyecto-devops || git clone https://github.com/jsrepuestos/proyecto-devops.git ~/proyecto-devops
            cd ~/proyecto-devops
            git pull origin main
            docker build -t mi-web .
            docker stop mi-web || true
            docker rm mi-web || true
            docker run -d -p 80:80 --name mi-web --restart unless-stopped mi-web
            echo "  Deploy completado"
          EOF