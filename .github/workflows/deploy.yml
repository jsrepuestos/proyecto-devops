name: Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy to VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 34.134.244.161
          username: jsrepuestosservicios
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            cd ~/proyecto-devops
            git pull origin main
            docker-compose down
            docker-compose up -d --build
